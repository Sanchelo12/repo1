events { 
    worker_connections 1024; 
}

http {
    sendfile on;
    include /etc/nginx/mime.types;

    server {
        listen 443 ssl;
        server_name api-uno.test;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            proxy_pass http://host.docker.internal:5001;
            proxy_set_header X-Custom-Secret "mi-llave-super-secreta";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 443 ssl;
        server_name api-dos.test;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            proxy_pass http://host.docker.internal:5002;
            proxy_set_header X-Custom-Secret "mi-llave-super-secreta";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Redirección de HTTP a HTTPS (Opcional pero recomendado)
    server {
        listen 80;
        server_name api-uno.test api-dos.test;
        return 301 https://$host$request_uri;
    }
}

### localhost (dentro del contenedor Nginx): Se refiere a sí mismo (el contenedor). Si buscas el puerto 5001 ahí, fallará porque la API no está dentro de ese "frasquito" de Docker.

### host.docker.internal (dentro de Docker): Es un alias que Docker crea para referirse a la IP de tu Windows. Nginx lanza la petición a host.docker.internal. Docker detecta ese nombre y dice: "Ah, esto va para el Host (Windows)". La petición sale del contenedor y llega a tu Windows (localhost de windows) por el puerto 5001.

### localhost (en tu Windows): Es tu PC real, donde están corriendo tus procesos de Node.js/Express en los puertos 5001 y 5002.